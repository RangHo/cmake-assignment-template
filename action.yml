name: Custom automatic assignment grader
description: Grade assignment by providing oracle source code

inputs:
  assignment-id:
    description: Assignment ID that is passed as the first command line argument
    required: true
  stdin-file:
    description: Path to file containing newline-separated list of inputs that is fed to standard input
    required: true
  stdout-file:
    description: Path to file containing newline-separated list of expected values of standard output
    required: false
  time-limit:
    description: Maximum execution time allowed
    required: false
    default: 2s
  memory-limit:
    description: Maximum memory usage allowed
    required: false
    default: 256m

runs:
  using: composite
  steps:
    - name: Build oracle binary
      if: ${{ ! inputs.stdout-file }}
      run: |
        echo "::debug::$(cmake --version)"
        cmake \
          -D CMAKE_BUILD_TYPE=Release \
          -G "Unix Makefiles" \
          -B ${{ github.action_path }}/build \
          ${{ github.action_path }}
        make -C ${{ github.action_path }}/build
      shell: bash

    - name: Generate expected stdout values
      id: prophecy
      if: ${{ ! inputs.stdout-file }}
      run: |
        echo "::debug::Standard input file is: $STDIN_FILE"
        echo "::debug::Standard output file will be: $STDOUT_FILE"
        echo "::debug::STDIN_FILE has $(wc -l < $STDIN_FILE) lines."
        ${{ github.action_path }}/build/assignment \
          ${{ inputs.assignment-id }} \
          $(wc -l < $STDIN_FILE) \
          < $STDIN_FILE \
          > $STDOUT_FILE
        echo "stdout-file=$STDOUT_FILE" >> $GITHUB_OUTPUT
      env:
        STDIN_FILE: ${{ inputs.stdin-file }}
        STDOUT_FILE: ${{ github.workspace }}/${{ hashFiles(inputs.stdin-file) }}.txt
      shell: bash

    - name: Build student binary
      run: |
        echo "::debug::$(cmake --version)"
        cmake \
          -D CMAKE_BUILD_TYPE=Release \
          -G "Unix Makefiles" \
          -B ${{ github.workspace }}/build \
          ${{ github.workspace }}
        make -C ${{ github.workspace }}/build
      shell: bash
        

    - name: Generate student response file
      id: attempt
      run: |
        
